<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="가계부"/>
<meta name="theme-color" content="#0F1117"/>
<title>가계부</title>

<!-- PWA Manifest (inline) -->
<script>
const manifestData = {
  name: "내 가계부",
  short_name: "가계부",
  description: "월별 수입·지출 관리 앱",
  start_url: "./",
  display: "standalone",
  background_color: "#0F1117",
  theme_color: "#0F1117",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%230F1117'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle'%3E💰%3C/text%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%230F1117'/%3E%3Ctext x='256' y='340' font-size='260' text-anchor='middle'%3E💰%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifestData)], {type:"application/json"});
const manifestURL = URL.createObjectURL(blob);
document.write('<link rel="manifest" href="' + manifestURL + '">');
</script>

<!-- Apple touch icon -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%230F1117'/%3E%3Ctext x='90' y='125' font-size='95' text-anchor='middle'%3E💰%3C/text%3E%3C/svg%3E"/>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0F1117; --bg2:#161B27; --bg3:#1F2937; --border:#1F2937;
  --text:#E5E7EB; --muted:#6B7280; --dim:#374151;
  --green:#34D399; --red:#F87171; --yellow:#FBBF24; --blue:#818CF8;
  --blue-dark:#4338CA;
}
html,body{background:var(--bg);color:var(--text);font-family:'Pretendard',sans-serif;min-height:100vh;max-width:480px;margin:0 auto;overflow-x:hidden;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input{font-family:inherit;color:var(--text);}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh;}
#topbar{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:center;}
#tabs{position:sticky;top:57px;z-index:19;background:var(--bg);border-bottom:1px solid var(--border);display:flex;}
.tab-btn{flex:1;padding:12px 0;background:transparent;border:none;color:var(--muted);font-size:13px;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit;}
.tab-btn.on{color:var(--blue);border-bottom:2px solid var(--blue);font-weight:600;}
#content{padding:16px;padding-bottom:60px;flex:1;}

/* Month nav */
#month-nav{display:flex;align-items:center;gap:10px;}
.nav-btn{background:var(--bg3);border:none;border-radius:8px;width:30px;height:30px;color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center;}
#month-label{font-size:17px;font-weight:700;color:#F9FAFB;min-width:108px;text-align:center;}

/* Buttons */
.btn-row{display:flex;gap:8px;}
.icon-btn{background:var(--bg3);border:1px solid var(--dim);border-radius:10px;padding:7px 13px;color:var(--muted);font-size:13px;font-weight:600;}
.accent-btn{background:linear-gradient(135deg,var(--blue-dark),var(--blue));border:none;border-radius:10px;padding:7px 14px;color:#fff;font-size:13px;font-weight:600;}
.primary-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--blue-dark),var(--blue));border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;}
.ghost-btn{padding:12px;background:var(--bg3);border:1px solid var(--dim);border-radius:12px;color:var(--muted);font-size:13px;}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.hero-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:12px;}
.alert-card{background:#FBBF2409;border:1px solid #FBBF2428;border-radius:14px;padding:16px;margin-bottom:12px;}
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.mini-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;}

/* Typography */
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
.link-btn{background:transparent;color:var(--blue);font-size:12px;padding:0;}
.hint{font-size:11px;color:var(--muted);}
.mono{font-family:'DM Mono',monospace;}

/* Progress */
.track{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden;margin-top:4px;}
.fill{height:100%;border-radius:4px;transition:width .5s ease;}

/* Txn row */
.txn-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.txn-emoji{font-size:20px;width:36px;text-align:center;}

/* Input */
.inp{width:100%;background:var(--bg3);border:1px solid var(--dim);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;margin-bottom:10px;outline:none;}

/* Modal */
.overlay{position:fixed;inset:0;background:#00000075;display:flex;align-items:flex-end;z-index:100;backdrop-filter:blur(4px);}
.sheet{width:100%;max-width:480px;margin:0 auto;background:#161B27;border-radius:20px 20px 0 0;padding:20px;max-height:90vh;overflow-y:auto;}
.sheet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.sheet-title{font-size:16px;font-weight:700;color:#F9FAFB;}
.close-btn{background:var(--bg3);border:none;border-radius:8px;width:28px;height:28px;color:var(--muted);font-size:18px;line-height:28px;text-align:center;}

/* Type toggle */
.type-row{display:flex;gap:6px;margin-bottom:14px;}
.type-btn{flex:1;padding:9px;border-radius:10px;border:1px solid var(--dim);font-size:13px;font-weight:600;transition:all .15s;}

/* Category chips */
.cat-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.cat-chip{padding:6px 10px;border-radius:8px;border:1px solid var(--dim);font-size:12px;color:var(--muted);background:transparent;}
.cat-chip.on{border-color:var(--blue);background:#818CF815;color:var(--blue);}

/* AI button */
.ai-btn{width:100%;padding:14px;background:linear-gradient(135deg,#312E81,var(--blue));border:none;border-radius:14px;color:#fff;font-size:14px;font-weight:700;letter-spacing:.3px;}

/* Spinner */
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block;}

/* Save banner */
#save-banner{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#34D39920;border:1px solid #34D39940;color:#34D399;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;}
#save-banner.show{opacity:1;}

/* Install banner */
#install-banner{background:linear-gradient(135deg,#312E81,#1e1b4b);border:1px solid var(--blue);border-radius:14px;padding:14px 16px;margin-bottom:12px;display:none;}
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <div id="month-nav">
      <button class="nav-btn" onclick="shiftMonth(-1)">‹</button>
      <span id="month-label"></span>
      <button class="nav-btn" id="next-btn" onclick="shiftMonth(1)">›</button>
    </div>
    <div class="btn-row">
      <button class="icon-btn" onclick="openApiKeyModal()" title="API 키 설정">🔑</button>
      <button class="icon-btn" onclick="openModal('scan')">📷</button>
      <button class="accent-btn" onclick="openModal('add')">＋ 추가</button>
    </div>
  </div>

  <div id="tabs">
    <button class="tab-btn on" onclick="setTab('dashboard')" id="tab-dashboard">현황</button>
    <button class="tab-btn" onclick="setTab('spending')" id="tab-spending">지출분석</button>
    <button class="tab-btn" onclick="setTab('history')" id="tab-history">내역</button>
  </div>

  <div id="content"></div>
</div>

<!-- Save banner -->
<div id="save-banner">✓ 저장됨</div>

<!-- ADD MODAL -->
<div class="overlay" id="modal-add" style="display:none" onclick="if(event.target===this)closeModal('add')">
  <div class="sheet">
    <div class="sheet-header">
      <span class="sheet-title">거래 추가</span>
      <button class="close-btn" onclick="closeModal('add')">×</button>
    </div>
    <div class="type-row">
      <button class="type-btn" id="type-expense" onclick="setFormType('expense')">지출</button>
      <button class="type-btn" id="type-income" onclick="setFormType('income')">수입</button>
    </div>
    <div class="cat-wrap" id="cat-wrap"></div>
    <input class="inp" type="number" id="f-amount" placeholder="금액 (원)" inputmode="numeric"/>
    <input class="inp" type="text" id="f-note" placeholder="내용 (선택)"/>
    <input class="inp" type="date" id="f-date"/>
    <button class="primary-btn" onclick="submitAdd()">추가하기</button>
  </div>
</div>

<!-- SCAN MODAL -->
<div class="overlay" id="modal-scan" style="display:none" onclick="if(event.target===this)closeModal('scan')">
  <div class="sheet">
    <div class="sheet-header">
      <span class="sheet-title">영수증 / 내역 스캔</span>
      <button class="close-btn" onclick="closeModal('scan')">×</button>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleScan(event)"/>
    <div id="scan-body"></div>
  </div>
</div>

<!-- BUDGET MODAL -->
<div class="overlay" id="modal-budget" style="display:none" onclick="if(event.target===this)closeModal('budget')">
  <div class="sheet">
    <div class="sheet-header">
      <span class="sheet-title">카테고리 예산 설정</span>
      <button class="close-btn" onclick="closeModal('budget')">×</button>
    </div>
    <div id="budget-body" style="max-height:360px;overflow-y:auto;padding-right:4px;margin-bottom:14px;"></div>
    <button class="primary-btn" onclick="saveBudgets()">저장하기</button>
  </div>
</div>

<!-- AI MODAL -->
<div class="overlay" id="modal-ai" style="display:none" onclick="if(event.target===this)closeModal('ai')">
  <div class="sheet">
    <div class="sheet-header">
      <span class="sheet-title">✦ AI 지출 분석</span>
      <button class="close-btn" onclick="closeModal('ai')">×</button>
    </div>
    <div id="ai-body"></div>
  </div>
</div>

<script>
// ─── Data ──────────────────────────────────────────────────────────────────────
const EXPENSE_CATS = ["식비","카페/음료","교통","쇼핑","의료","문화/여가","통신","주거","교육","술/유흥","기타지출"];
const INCOME_CATS  = ["급여","부업","투자수익","용돈","환급","기타수입"];
const EMOJI = {식비:"🍚","카페/음료":"☕",교통:"🚇",쇼핑:"🛍",의료:"💊","문화/여가":"🎬",통신:"📱",주거:"🏠",교육:"📚","술/유흥":"🍺",기타지출:"📦",급여:"💼",부업:"💻",투자수익:"📈",용돈:"💝",환급:"🔄",기타수입:"💰"};
const DISC = ["카페/음료","쇼핑","문화/여가","술/유흥"];
const DEFAULT_BUDGETS = {식비:300000,"카페/음료":50000,교통:80000,쇼핑:100000,의료:50000,"문화/여가":80000,통신:60000,주거:700000,교육:100000,"술/유흥":50000,기타지출:50000};

const fmt = n => new Intl.NumberFormat("ko-KR").format(Math.abs(n)) + "원";
const todayStr = () => new Date().toISOString().split("T")[0];
const monthOf = d => d.slice(0,7);
const currentMonth = () => todayStr().slice(0,7);
const dayName = d => ["일","월","화","수","목","금","토"][new Date(d).getDay()];

// ─── State ─────────────────────────────────────────────────────────────────────
let txns = [], budgets = {...DEFAULT_BUDGETS};
let selectedMonth = currentMonth();
let activeTab = "dashboard";
let formType = "expense", formCat = "식비";

// ─── LocalStorage ──────────────────────────────────────────────────────────────
function save() {
  localStorage.setItem("budget_txns", JSON.stringify(txns));
  localStorage.setItem("budget_budgets", JSON.stringify(budgets));
  showSaveBanner();
}
function load() {
  try { txns = JSON.parse(localStorage.getItem("budget_txns")) || getSampleData(); } catch { txns = getSampleData(); }
  try { budgets = JSON.parse(localStorage.getItem("budget_budgets")) || {...DEFAULT_BUDGETS}; } catch { budgets = {...DEFAULT_BUDGETS}; }
}
function showSaveBanner() {
  const b = document.getElementById("save-banner");
  b.classList.add("show");
  setTimeout(()=>b.classList.remove("show"), 1800);
}

function getSampleData() {
  return [
    {id:1,type:"income",category:"급여",amount:3500000,note:"4월 급여",date:"2026-04-25"},
    {id:2,type:"expense",category:"주거",amount:650000,note:"월세",date:"2026-04-01"},
    {id:3,type:"expense",category:"식비",amount:45000,note:"마트 장보기",date:"2026-04-22"},
    {id:4,type:"expense",category:"식비",amount:12500,note:"점심",date:"2026-04-23"},
    {id:5,type:"expense",category:"카페/음료",amount:5500,note:"아메리카노",date:"2026-04-21"},
    {id:6,type:"expense",category:"카페/음료",amount:6000,note:"카페 라떼",date:"2026-04-23"},
    {id:7,type:"expense",category:"카페/음료",amount:5500,note:"아메리카노",date:"2026-04-24"},
    {id:8,type:"expense",category:"쇼핑",amount:89000,note:"의류 구매",date:"2026-04-20"},
    {id:9,type:"expense",category:"쇼핑",amount:35000,note:"온라인 쇼핑",date:"2026-04-18"},
    {id:10,type:"expense",category:"교통",amount:52000,note:"교통카드 충전",date:"2026-04-15"},
    {id:11,type:"expense",category:"통신",amount:55000,note:"핸드폰 요금",date:"2026-04-10"},
    {id:12,type:"expense",category:"술/유흥",amount:45000,note:"금요일 회식",date:"2026-04-19"},
    {id:13,type:"expense",category:"문화/여가",amount:15000,note:"영화",date:"2026-04-12"},
    {id:14,type:"income",category:"부업",amount:200000,note:"프리랜서",date:"2026-04-20"},
  ];
}

// ─── Month nav ─────────────────────────────────────────────────────────────────
function shiftMonth(dir) {
  const [y,m] = selectedMonth.split("-").map(Number);
  const d = new Date(y, m-1+dir, 1);
  const s = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  if(dir>0 && s>currentMonth()) return;
  selectedMonth = s;
  render();
}
function updateMonthLabel() {
  const [y,m] = selectedMonth.split("-");
  document.getElementById("month-label").textContent = `${y}년 ${m}월`;
  document.getElementById("next-btn").style.opacity = selectedMonth === currentMonth() ? "0.3" : "1";
}

// ─── Tab ───────────────────────────────────────────────────────────────────────
function setTab(t) {
  activeTab = t;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("on"));
  document.getElementById("tab-"+t).classList.add("on");
  renderContent();
}

// ─── Computed ──────────────────────────────────────────────────────────────────
function getMonthTxns() { return txns.filter(t=>monthOf(t.date)===selectedMonth); }
function getIncome(mt)  { return mt.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0); }
function getExpense(mt) { return mt.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0); }
function getByCat(mt)   {
  return EXPENSE_CATS.map(cat=>({
    cat, amount: mt.filter(t=>t.type==="expense"&&t.category===cat).reduce((s,t)=>s+t.amount,0), budget: budgets[cat]||0
  })).filter(x=>x.amount>0).sort((a,b)=>b.amount-a.amount);
}

// ─── Render ────────────────────────────────────────────────────────────────────
function render() { updateMonthLabel(); renderContent(); }

function renderContent() {
  const mt = getMonthTxns();
  const income = getIncome(mt), expense = getExpense(mt);
  const balance = income - expense;
  const saveRate = income>0 ? Math.round((balance/income)*100) : 0;
  const byCat = getByCat(mt);
  const discTotal = mt.filter(t=>t.type==="expense"&&DISC.includes(t.category)).reduce((s,t)=>s+t.amount,0);
  const content = document.getElementById("content");

  if(activeTab === "dashboard") {
    content.innerHTML = `
      <!-- Install banner -->
      <div id="install-banner">
        <div style="font-size:13px;font-weight:600;margin-bottom:4px;">📲 홈 화면에 추가하기</div>
        <div style="font-size:12px;color:#a5b4fc;margin-bottom:10px;">앱처럼 사용할 수 있어요</div>
        <button class="primary-btn" onclick="installApp()" style="font-size:13px;padding:10px;">홈 화면에 추가</button>
      </div>

      <!-- Hero -->
      <div class="hero-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <div class="hint" style="letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;">이번 달 잔액</div>
            <div class="mono" style="font-size:28px;font-weight:800;letter-spacing:-1px;color:${balance>=0?"var(--green)":"var(--red)"}">
              ${balance>=0?"+":"-"}${fmt(balance)}
            </div>
          </div>
          <div style="font-size:12px;font-weight:600;border-radius:20px;padding:5px 13px;background:${saveRate>=20?"#34D39918":"#F8717118"};color:${saveRate>=20?"var(--green)":"var(--red)"};border:1px solid ${saveRate>=20?"#34D39940":"#F8717140"}">
            저축률 ${saveRate}%
          </div>
        </div>
        <div style="margin-top:14px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
            <span class="hint">지출 비율 (${income>0?Math.round((expense/income)*100):0}%)</span>
            <span class="hint mono">${fmt(expense)} / ${fmt(income)}</span>
          </div>
          <div class="track"><div class="fill" style="width:${income>0?Math.min(100,(expense/income)*100):0}%;background:${expense>income?"var(--red)":"linear-gradient(90deg,var(--green),#6EE7B7)"}"></div></div>
        </div>
      </div>

      <!-- Mini cards -->
      <div class="mini-grid">
        <div class="mini-card"><div class="hint" style="margin-bottom:5px;">↑ 총 수입</div><div class="mono" style="font-size:15px;font-weight:700;color:var(--green)">${fmt(income)}</div></div>
        <div class="mini-card"><div class="hint" style="margin-bottom:5px;">↓ 총 지출</div><div class="mono" style="font-size:15px;font-weight:700;color:var(--red)">${fmt(expense)}</div></div>
      </div>

      <!-- Discretionary alert -->
      ${discTotal>0 ? `
      <div class="alert-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <div style="font-size:12px;color:var(--yellow);font-weight:600;margin-bottom:4px;">🔍 절감 가능한 지출</div>
            <div class="mono" style="font-size:22px;font-weight:700;color:var(--yellow)">${fmt(discTotal)}</div>
            <div class="hint" style="margin-top:3px;">카페·쇼핑·여가·술유흥 합계</div>
          </div>
          <button style="font-size:12px;color:var(--yellow);background:transparent;border:1px solid #FBBF2440;border-radius:8px;padding:6px 12px;white-space:nowrap" onclick="setTab('spending')">자세히 →</button>
        </div>
      </div>` : ""}

      <!-- Budget overview -->
      <div class="card">
        <div class="card-header">
          <span>예산 현황</span>
          <button class="link-btn" onclick="openModal('budget')">예산 설정 →</button>
        </div>
        ${byCat.slice(0,5).map(({cat,amount,budget})=>budgetRowHTML(cat,amount,budget)).join("")}
        ${byCat.length===0?"<div style='text-align:center;padding:24px 0;color:var(--muted);font-size:13px'>이번 달 지출 없음</div>":""}
      </div>

      <!-- AI Button -->
      <button class="ai-btn" onclick="openModal('ai')">✦ AI에게 지출 분석 받기</button>
    `;
    checkInstallBanner();
  }

  else if(activeTab === "spending") {
    content.innerHTML = `
      <div class="card">
        <div class="card-header"><span>카테고리별 지출</span></div>
        ${byCat.map(({cat,amount,budget})=>{
          const pct = budget>0?Math.min(100,(amount/budget)*100):null;
          const over = budget>0&&amount>budget;
          return `
          <div style="margin-bottom:16px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
              <span style="font-size:13px">${EMOJI[cat]||"•"} ${cat}</span>
              <div>
                <span class="mono" style="font-size:13px;color:${over?"var(--red)":"var(--text)"}">${fmt(amount)}</span>
                ${budget>0?`<span class="hint"> / ${fmt(budget)}</span>`:""}
              </div>
            </div>
            ${pct!==null?`<div class="track"><div class="fill" style="width:${pct}%;background:${over?"var(--red)":pct>80?"var(--yellow)":"var(--green)"}"></div></div>`:""}
            ${over?`<div style="font-size:11px;color:var(--red);margin-top:3px">⚠ 예산 초과 ${fmt(amount-budget)}</div>`:""}
          </div>`;
        }).join("")}
        ${byCat.length===0?"<div style='text-align:center;padding:24px 0;color:var(--muted);font-size:13px'>이번 달 지출 없음</div>":""}
      </div>

      ${DISC.some(c=>mt.find(t=>t.category===c&&t.type==="expense")) ? `
      <div class="card" style="border-color:#FBBF2428;background:#FBBF2406;">
        <div class="card-header"><span style="color:var(--yellow)">🔍 절감 가능 지출 상세</span></div>
        ${DISC.map(cat=>{
          const items = mt.filter(t=>t.type==="expense"&&t.category===cat);
          const total = items.reduce((s,t)=>s+t.amount,0);
          if(!total) return "";
          return `
          <div style="margin-bottom:14px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <span style="font-size:13px;font-weight:500">${EMOJI[cat]} ${cat} <span class="hint">(${items.length}건)</span></span>
              <span class="mono" style="font-size:13px;color:var(--yellow)">${fmt(total)}</span>
            </div>
            ${items.map(t=>`
            <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:4px 0;border-bottom:1px solid #ffffff08;">
              <span>${t.note} <span style="color:var(--dim)">· ${t.date.slice(5)}</span></span>
              <span class="mono">${fmt(t.amount)}</span>
            </div>`).join("")}
          </div>`;
        }).join("")}
      </div>` : ""}
    `;
  }

  else if(activeTab === "history") {
    const grouped = mt.reduce((acc,t)=>{ (acc[t.date]||(acc[t.date]=[])).push(t); return acc; },{});
    const dates = Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
    content.innerHTML = dates.length===0
      ? "<div style='text-align:center;padding:40px 0;color:var(--muted);font-size:13px'>이번 달 내역이 없어요</div>"
      : dates.map(date=>{
          const items = grouped[date];
          const dayExp = items.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
          return `
          <div style="margin-bottom:18px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
              <span class="hint" style="letter-spacing:.5px">${date.replace(/-/g,".")} (${dayName(date)})</span>
              ${dayExp>0?`<span class="hint mono" style="color:var(--red)">-${fmt(dayExp)}</span>`:""}
            </div>
            ${items.sort((a,b)=>b.type.localeCompare(a.type)).map(t=>`
            <div class="txn-row">
              <div style="display:flex;align-items:center;gap:10px;">
                <span class="txn-emoji">${EMOJI[t.category]||"•"}</span>
                <div>
                  <div style="font-size:13px;font-weight:500;color:var(--text)">${t.note||t.category}</div>
                  <div class="hint">${t.category}${t.source==="scan"?" · 📷":""}</div>
                </div>
              </div>
              <div style="text-align:right;">
                <div class="mono" style="font-size:13px;font-weight:600;color:${t.type==="expense"?"var(--red)":"var(--green)"}">
                  ${t.type==="expense"?"-":"+"}${fmt(t.amount)}
                </div>
                <button style="font-size:11px;color:var(--dim);background:none;border:none;cursor:pointer" onclick="deleteTxn(${t.id})">삭제</button>
              </div>
            </div>`).join("")}
          </div>`;
        }).join("");
  }
}

function budgetRowHTML(cat, amount, budget) {
  const pct = budget>0?Math.min(100,(amount/budget)*100):null;
  const over = budget>0&&amount>budget;
  return `
  <div style="margin-bottom:12px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
      <span style="font-size:13px">${EMOJI[cat]||"•"} ${cat}</span>
      <div>
        <span class="mono" style="font-size:12px;color:${over?"var(--red)":"var(--text)"}">${fmt(amount)}</span>
        ${budget>0?`<span class="hint"> / ${fmt(budget)}</span>`:""}
      </div>
    </div>
    ${pct!==null?`<div class="track"><div class="fill" style="width:${pct}%;background:${over?"var(--red)":pct>80?"var(--yellow)":"var(--green)"}"></div></div>`:""}
  </div>`;
}

// ─── Add txn ───────────────────────────────────────────────────────────────────
function openModal(name) {
  if(name==="add") { initAddForm(); }
  if(name==="scan") { initScanModal(); }
  if(name==="budget") { initBudgetModal(); }
  if(name==="ai") { initAIModal(); }
  document.getElementById("modal-"+name).style.display="flex";
}
function closeModal(name) { document.getElementById("modal-"+name).style.display="none"; }

function initAddForm() {
  formType="expense"; formCat="식비";
  document.getElementById("f-amount").value="";
  document.getElementById("f-note").value="";
  document.getElementById("f-date").value=todayStr();
  updateTypeUI(); renderCats();
}
function setFormType(t) { formType=t; formCat=(t==="expense"?EXPENSE_CATS:INCOME_CATS)[0]; updateTypeUI(); renderCats(); }
function updateTypeUI() {
  const eBtn=document.getElementById("type-expense"), iBtn=document.getElementById("type-income");
  eBtn.style.cssText=`flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:600;transition:all .15s;border:1px solid ${formType==="expense"?"var(--red)":"var(--dim)"};background:${formType==="expense"?"#F8717115":"transparent"};color:${formType==="expense"?"var(--red)":"var(--muted)"};font-family:inherit;cursor:pointer`;
  iBtn.style.cssText=`flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:600;transition:all .15s;border:1px solid ${formType==="income"?"var(--green)":"var(--dim)"};background:${formType==="income"?"#34D39915":"transparent"};color:${formType==="income"?"var(--green)":"var(--muted)"};font-family:inherit;cursor:pointer`;
}
function renderCats() {
  const cats = formType==="expense"?EXPENSE_CATS:INCOME_CATS;
  document.getElementById("cat-wrap").innerHTML = cats.map(c=>`
    <button class="cat-chip ${c===formCat?"on":""}" onclick="selectCat('${c}')">${EMOJI[c]||""} ${c}</button>
  `).join("");
}
function selectCat(c) { formCat=c; renderCats(); }
function submitAdd() {
  const amount = parseInt(document.getElementById("f-amount").value);
  if(!amount) return;
  const note = document.getElementById("f-note").value;
  const date = document.getElementById("f-date").value || todayStr();
  txns.unshift({id:Date.now(),type:formType,category:formCat,amount,note,date,source:"manual"});
  save(); closeModal("add"); render();
}
function deleteTxn(id) { txns=txns.filter(t=>t.id!==id); save(); render(); }

// ─── Scan ──────────────────────────────────────────────────────────────────────
function initScanModal() {
  document.getElementById("scan-body").innerHTML = `
    <div onclick="document.getElementById('file-input').click()" style="border:2px dashed var(--dim);border-radius:16px;padding:36px 20px;text-align:center;cursor:pointer;">
      <div style="font-size:40px;margin-bottom:10px;">📷</div>
      <div style="color:var(--muted);font-size:13px;line-height:1.7">영수증 · 쇼핑몰 주문 내역<br/>계좌 지출 내역 이미지 업로드</div>
      <div style="color:var(--blue);font-size:13px;font-weight:600;margin-top:10px">이미지 선택 →</div>
    </div>`;
}
async function handleScan(e) {
  const file = e.target.files[0]; if(!file) return;
  if(!getApiKey()){openApiKeyModal();return;}
  document.getElementById("scan-body").innerHTML = `<div style="text-align:center;padding:40px 0"><div class="spin" style="font-size:36px">🔍</div><div style="color:var(--blue);font-size:13px;margin-top:14px">AI가 분석중입니다…</div></div>`;
  const b64 = await new Promise(res=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.readAsDataURL(file); });
  try {
    const res = await fetch("https://corsproxy.io/?https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":getApiKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:b64}},
        {type:"text",text:`이미지에서 거래 정보 JSON만 추출. 다른 텍스트 없이:
{"transactions":[{"type":"expense 또는 income","category":"${[...EXPENSE_CATS,...INCOME_CATS].join("/")} 중 택1","amount":숫자,"note":"내용","date":"YYYY-MM-DD"}],"summary":"요약"}
날짜 모르면 오늘(${todayStr()}).`}]}]})});
    const data = await res.json();
    const text = data.content?.find(b=>b.type==="text")?.text||"";
    const result = JSON.parse(text.replace(/```json|```/g,"").trim());
    const items = result.transactions||[];
    document.getElementById("scan-body").innerHTML = `
      <div style="font-size:12px;color:var(--green);margin-bottom:8px">✓ ${items.length}개 항목 인식</div>
      ${result.summary?`<div class="hint" style="margin-bottom:12px">${result.summary}</div>`:""}
      ${items.map((t,i)=>`
      <div class="txn-row" style="padding:8px 0">
        <div><div style="font-size:13px;font-weight:500">${t.note}</div><div class="hint">${t.category} · ${t.date}</div></div>
        <span class="mono" style="font-size:13px;color:${t.type==="expense"?"var(--red)":"var(--green)"}">${t.type==="expense"?"-":"+"}${fmt(t.amount)}</span>
      </div>`).join("")}
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="ghost-btn" style="flex:1" onclick="initScanModal();document.getElementById('file-input').click()">다시 스캔</button>
        <button class="primary-btn" style="flex:2" onclick="confirmScan(${JSON.stringify(items).replace(/"/g,'&quot;')})">모두 추가</button>
      </div>`;
  } catch {
    document.getElementById("scan-body").innerHTML = `<div style="color:var(--red);text-align:center;padding:20px;font-size:13px">인식 실패. 다시 시도해주세요.</div><button class="primary-btn" style="margin-top:10px" onclick="initScanModal()">다시 시도</button>`;
  }
  e.target.value="";
}
function confirmScan(items) {
  const parsed = typeof items==="string" ? JSON.parse(items) : items;
  parsed.forEach((t,i)=>txns.unshift({...t,id:Date.now()+i,amount:parseInt(t.amount),source:"scan"}));
  save(); closeModal("scan"); render();
}

// ─── Budget ────────────────────────────────────────────────────────────────────
function initBudgetModal() {
  document.getElementById("budget-body").innerHTML = EXPENSE_CATS.map(cat=>`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <span style="font-size:13px;min-width:110px">${EMOJI[cat]} ${cat}</span>
      <input class="inp" type="number" id="b-${cat}" value="${budgets[cat]||""}" placeholder="설정 안함" inputmode="numeric"
        style="margin-bottom:0;width:130px;text-align:right;font-family:'DM Mono',monospace;font-size:13px"/>
    </div>`).join("");
}
function saveBudgets() {
  EXPENSE_CATS.forEach(cat=>{ const v=parseInt(document.getElementById("b-"+cat)?.value); budgets[cat]=v||0; });
  save(); closeModal("budget"); render();
}

// ─── AI Analysis ───────────────────────────────────────────────────────────────
async function initAIModal() {
  if(!getApiKey()){closeModal("ai");openApiKeyModal();return;}
  document.getElementById("ai-body").innerHTML = `<div style="text-align:center;padding:36px 0"><div class="spin" style="font-size:32px">✦</div><div style="color:var(--blue);font-size:13px;margin-top:14px">분석중입니다…</div></div>`;
  const mt = getMonthTxns();
  const income = getIncome(mt), expense = getExpense(mt);
  const cats = EXPENSE_CATS.map(c=>({c,a:mt.filter(t=>t.type==="expense"&&t.category===c).reduce((s,t)=>s+t.amount,0)})).filter(x=>x.a>0).map(x=>`${x.c}:${fmt(x.a)}`).join(", ");
  try {
    const res = await fetch("https://corsproxy.io/?https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":getApiKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:
        `가계부 사용자의 ${selectedMonth} 데이터 분석.\n수입:${fmt(income)}\n지출:${fmt(expense)}\n저축률:${income>0?Math.round(((income-expense)/income)*100):0}%\n카테고리:${cats}\n\n다음을 친근하고 구체적인 한국어로:\n1. 이번 달 지출 패턴 핵심 요약(2-3문장)\n2. 가장 줄일 수 있는 지출 TOP 2-3 (구체적 금액과 방법)\n3. 다음 달 목표 제안\n\n마크다운 없이 일반 텍스트로, 응원하는 톤으로.`}]})});
    const data = await res.json();
    const text = data.content?.find(b=>b.type==="text")?.text||"분석 결과를 가져오지 못했어요.";
    document.getElementById("ai-body").innerHTML = `<div style="font-size:13px;color:#D1D5DB;line-height:1.9;white-space:pre-wrap;max-height:400px;overflow-y:auto">${text}</div>`;
  } catch {
    document.getElementById("ai-body").innerHTML = `<div style="color:var(--red);text-align:center;padding:20px;font-size:13px">분석 중 오류가 발생했어요.</div>`;
  }
}

// ─── PWA Install ───────────────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", e => { e.preventDefault(); deferredPrompt=e; checkInstallBanner(); });
function checkInstallBanner() {
  const banner = document.getElementById("install-banner");
  if(banner) banner.style.display = deferredPrompt ? "block" : "none";
}
function installApp() {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; checkInstallBanner(); });
}

// ─── Service Worker ────────────────────────────────────────────────────────────
if("serviceWorker" in navigator) {
  const sw = `
const CACHE="budget-v1";
const ASSETS=["./"];
self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match("./")))));
  `;
  const blob = new Blob([sw], {type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}


// ─── API Key Management ────────────────────────────────────────────────────────
function getApiKey() {
  return localStorage.getItem("anthropic_api_key") || "";
}
function saveApiKey(key) {
  localStorage.setItem("anthropic_api_key", key.trim());
}
function openApiKeyModal() {
  const existing = getApiKey();
  document.getElementById("api-key-input").value = existing;
  document.getElementById("modal-apikey").style.display = "flex";
}
function saveApiKeyAndClose() {
  const key = document.getElementById("api-key-input").value.trim();
  if(!key.startsWith("sk-ant-")) {
    alert("올바른 API 키를 입력해주세요 (sk-ant-로 시작)");
    return;
  }
  saveApiKey(key);
  document.getElementById("modal-apikey").style.display = "none";
  showSaveBanner();
}

// ─── Init ──────────────────────────────────────────────────────────────────────
load();
render();
</script>
